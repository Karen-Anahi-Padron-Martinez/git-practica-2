<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Karen Anahí Padrón Martínez</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 8px solid #2563eb;
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            background: #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: #64748b;
        }

        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            color: #2563eb;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Karen Anahí Padrón Martínez</h1>
        <h2>TSU en Desarrollo de Software Multilataforma</h2>
        <p>¡Hola! Soy desarrolladora en formación, enfocada en la creación de soluciones digitales eficientes, intuitivas y adaptables a múltiples entornos y dispositivos.</p>
    </div>

</body>
</html>
